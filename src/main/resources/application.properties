# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:3000}

# ── MongoDB ───────────────────────────────────────────────────────────────────
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/chatroom}

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:dev_secret_change_in_prod_must_be_long_enough_32chars}      
jwt.expiry.user=2592000       # 30 days in seconds
jwt.expiry.admin=28800        # 8 hours in seconds

# ── Admin credentials ─────────────────────────────────────────────────────────
admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:admin123}

# ── File Upload (max 15MB like Node) ─────────────────────────────────────────
spring.servlet.multipart.max-file-size=15MB
spring.servlet.multipart.max-request-size=15MB

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.chatroom=DEBUG
logging.level.org.springframework.web.socket=INFO
